<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>404 - Page Not Found | UISTO</title>
  <meta name="description" content="Oops! The page you’re looking for can’t be found." />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" href="./assets/img/logo2.png" type="image/x-icon" />

  <style>
    :root {
      --navy: #0d1b2a;
      --navy-light: #1b2f4c;
      --gold: #c9a84c;
      --gold-light: #e6c875;
      --white: #ffffff;
      --gray: #8a9ab0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--navy);
      color: var(--white);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated background glow */
    .glow-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 60vw;
      height: 60vw;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, rgba(13,27,42,0) 70%);
      z-index: 0;
      pointer-events: none;
      animation: pulseGlow 6s ease-in-out infinite alternate;
    }

    @keyframes pulseGlow {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    /* Content wrapper */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo-img {
      width: 90px;
      margin-bottom: 20px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
    }

    /* 404 large text */
    .huge-404 {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      font-size: clamp(100px, 18vw, 220px);
      line-height: 1;
      margin: 0;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 10px 30px rgba(201,168,76,0.3));
      position: relative;
    }

    /* Text */
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    p {
      font-size: clamp(16px, 2vw, 18px);
      color: var(--gray);
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* Button */
    .home-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 16px;
      padding: 16px 36px;
      border-radius: 50px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 24px rgba(201, 168, 76, 0.25);
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    .home-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(201, 168, 76, 0.4);
      background-color: var(--gold-light);
    }

    .home-btn:active {
      transform: translateY(0);
    }

    .home-btn svg {
      transition: transform 0.3s ease;
    }

    .home-btn:hover svg {
      transform: translateX(-4px);
    }

    /* Floating particles */
    .particle {
      position: absolute;
      background: var(--gold);
      border-radius: 50%;
      opacity: 0.3;
      pointer-events: none;
    }

    @media (max-width: 600px) {
      .content { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- Dynamic blurred background -->
  <div class="glow-bg"></div>

  <!-- Particles (Optional subtle design element) -->
  <div class="particle" style="width: 8px; height: 8px; top: 20%; left: 15%; animation: pulseGlow 4s infinite alternate;"></div>
  <div class="particle" style="width: 12px; height: 12px; top: 75%; left: 80%; animation: pulseGlow 5s infinite alternate-reverse;"></div>
  <div class="particle" style="width: 6px; height: 6px; top: 60%; left: 20%; animation: pulseGlow 3s infinite alternate;"></div>
  <div class="particle" style="width: 10px; height: 10px; top: 30%; left: 75%; animation: pulseGlow 6s infinite alternate-reverse;"></div>

  <div class="content">
    <a href="./index"><img src="./assets/img/logo2.png" alt="UISTO Logo" class="logo-img" /></a>
    
    <div class="huge-404">404</div>
    
    <h1>Lost in Space?</h1>
    <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    
    <a href="./index" class="home-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Return Home
    </a>
  </div>

</body>
</html>
